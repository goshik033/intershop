<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Витрина</title>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center; gap:16px;">
    <h1 style="margin:0;">Витрина</h1>
    <nav>
        <a href="/products/new">Добавить товар</a> |
        <a href="/cart">Корзина</a> |
        <a href="/orders">Заказы</a>
    </nav>
</header>

<hr/>

<!-- ФИЛЬТРЫ -->
<form method="get" th:action="@{/products}" style="display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;">
    <div>
        <label>Поиск</label><br/>
        <input type="text" name="q" th:value="${q}" placeholder="название или описание" style="padding:6px; width:240px;">
    </div>

    <div>
        <label>Цена от</label><br/>
        <input type="number" step="0.01" min="0" name="min" th:value="${min}" style="padding:6px; width:140px;">
    </div>

    <div>
        <label>Цена до</label><br/>
        <input type="number" step="0.01" min="0" name="max" th:value="${max}" style="padding:6px; width:140px;">
    </div>

    <div>
        <label>Сортировка</label><br/>
        <select name="sort" style="padding:6px;">
            <option value="name,asc"
                    th:selected="${param.sort == null or param.sort[0] == 'name,asc'}">Имя ↑</option>
            <option value="name,desc"
                    th:selected="${param.sort != null and param.sort[0] == 'name,desc'}">Имя ↓</option>
            <option value="price,asc"
                    th:selected="${param.sort != null and param.sort[0] == 'price,asc'}">Цена ↑</option>
            <option value="price,desc"
                    th:selected="${param.sort != null and param.sort[0] == 'price,desc'}">Цена ↓</option>
        </select>
    </div>

    <div>
        <label>На странице</label><br/>
        <select name="size" style="padding:6px;">
            <option value="10"  th:selected="${page.size == 10}">10</option>
            <option value="20"  th:selected="${page.size == 20}">20</option>
            <option value="50"  th:selected="${page.size == 50}">50</option>
            <option value="100" th:selected="${page.size == 100}">100</option>
        </select>
    </div>

    <input type="hidden" name="page" value="0"/>

    <div>
        <button type="submit">Применить</button>
        <a href="/products" style="margin-left:8px;">Сбросить</a>
    </div>
</form>

<hr/>

<!-- СПИСОК -->
<div th:if="${page == null or page.isEmpty()}">
    <p>Товаров не найдено.</p>
</div>

<div th:if="${page != null and !page.isEmpty()}">
    <p>
        Показано: <b th:text="${page.numberOfElements}">0</b>
        из <b th:text="${page.totalElements}">0</b>
    </p>

    <ul style="padding-left:18px;">
        <li th:each="p : ${page.content}" style="margin-bottom:14px;">
            <div>
                <b th:text="${p.name}">Название</b>
                — <span th:text="${p.price}">0.00</span>
            </div>

            <div th:text="${p.description}">Описание</div>

            <div th:if="${p.imageUrl != null and !#strings.isEmpty(p.imageUrl)}" style="margin-top:6px;">
                <img th:src="${p.imageUrl}" alt="img" width="120">
            </div>

            <div style="margin-top:6px;">
                <a th:href="@{'/products/' + ${p.id}}">Открыть карточку</a>
                |
                <a th:href="@{'/products/' + ${p.id} + '/edit'}">Редактировать</a>
            </div>
        </li>
    </ul>

    <!-- ПАГИНАЦИЯ -->
    <div style="display:flex; gap:10px; align-items:center;">
        <a th:if="${page.hasPrevious()}"
           th:href="@{/products(q=${q},min=${min},max=${max},page=${page.number - 1},size=${page.size},sort=${param.sort})}">
            ← Назад
        </a>

        <span>
      Страница <b th:text="${page.number + 1}">1</b> из <b th:text="${page.totalPages}">1</b>
    </span>

        <a th:if="${page.hasNext()}"
           th:href="@{/products(q=${q},min=${min},max=${max},page=${page.number + 1},size=${page.size},sort=${param.sort})}">
            Вперёд →
        </a>
    </div>
</div>

<p style="margin-top:18px;"><a href="/">На главную</a></p>

</body>
</html>
