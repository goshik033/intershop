<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказы</title>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center; gap:16px;">
    <h1 style="margin:0;">Заказы</h1>
    <nav>
        <a href="/products">Витрина</a> |
        <a href="/cart">Корзина</a>
        <form th:action="@{/logout}" method="post" style="display:inline; margin-left:12px;">
            <button type="submit">Выйти</button>
        </form>
    </nav>
</header>

<hr/>

<div th:if="${orders == null or #lists.isEmpty(orders)}">
    <p>Заказов пока нет.</p>
</div>

<div th:if="${orders != null and !#lists.isEmpty(orders)}">
    <ul>
        <li th:each="o : ${orders}">
            <a th:href="@{'/orders/' + ${o.id}}">
                Заказ #<span th:text="${o.id}">0</span>
            </a>
            —
            <span th:text="${#temporals.format(o.createdAt, 'yyyy-MM-dd HH:mm')}">date</span>
        </li>
    </ul>

    <p><b>Общая сумма всех заказов:</b> <span th:text="${total}">0.00</span></p>
</div>

</body>
</html>
